      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Segoe UI",
          "Roboto",
          "Noto Sans TC",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Helvetica Neue",

        color: #1e2a3e;
        line-height: 1.45;
      }

      /* 整體佈局 Flex，滿版高度 */
      .app-wrapper {
        display: flex;
        min-height: 100vh;
        width: 100%;
      }

      /* ========= ASIDE 側邊欄選單 ========= */
      aside {
        width: 280px;
        background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
        border-right: 1px solid #e2e8f0;
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.02);
        overflow-y: auto;
        flex-shrink: 0;
        transition: all 0.2s ease;
        z-index: 10;
      }

      .aside-header {
        padding: 28px 20px 20px 24px;
        border-bottom: 1px solid #e9edf2;
        margin-bottom: 12px;
      }

      .aside-header h2 {
        font-size: 1.6rem;
        font-weight: 600;
        background: linear-gradient(135deg, #b87333, #8b5a2b);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        letter-spacing: -0.3px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .aside-header p {
        font-size: 0.8rem;
        color: #5b6e8c;
        margin-top: 8px;
        border-left: 3px solid #b87333;
        padding-left: 12px;
      }

      .menu-list {
        list-style: none;
        padding: 0 12px 24px 12px;
      }

      .menu-item {
        margin: 6px 0;
        border-radius: 14px;
        transition: all 0.2s;
      }

      .menu-btn {
        width: 100%;
        text-align: left;
        background: transparent;
        border: none;
        padding: 12px 16px;
        font-size: 0.95rem;
        font-weight: 500;
        color: #2c3e50;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 12px;
        font-family: inherit;
      }

      .menu-btn i {
        width: 24px;
        font-size: 1.2rem;
        color: #8f9bb3;
        transition: color 0.2s;
      }

      .menu-btn:hover {
        background: #eef2ff;
        color: #b87333;
      }
      .menu-btn:hover i {
        color: #b87333;
      }

      .menu-item.active .menu-btn {
        background: #e9e3d5;
        color: #7a4c1a;
        font-weight: 600;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
      }
      .menu-item.active .menu-btn i {
        color: #b87333;
      }

        flex: 1;
        background: #fefefe;
        overflow-y: auto;
        padding: 28px 36px;
      }

      .content-card {
        max-width: 1280px;
        margin: 0 auto;
        animation: fadeSlideUp 0.3s ease-out;
      }

      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .section-title {
        font-size: 1.9rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #1e293b;
        border-left: 6px solid #b87333;
        padding-left: 20px;
        letter-spacing: -0.2px;
      }

      .section-sub {
        color: #5b6e8c;
        margin-bottom: 28px;
        margin-top: 8px;
        padding-left: 26px;
        font-size: 0.9rem;
      }

      .info-grid {
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .info-block {
        background: #ffffff;
        border-radius: 28px;
        box-shadow:
          0 8px 20px rgba(0, 0, 0, 0.02),
          0 2px 4px rgba(0, 0, 0, 0.02);
        border: 1px solid #edf2f7;
        overflow: hidden;
        transition: all 0.2s;
      }

      .info-header {
        background: #faf9fc;
        padding: 18px 28px;
        border-bottom: 1px solid #ecf3fa;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .info-header i {
        font-size: 1.7rem;
        color: #b87333;
      }
      .info-header h3 {
        font-size: 1.35rem;
        font-weight: 600;
        margin: 0;
      }

      .info-body {
        padding: 20px 28px;
        font-size: 1rem;
      }

      .info-body p {
        margin-bottom: 12px;
      }

      .highlight {
        background: #fef7e6;
        padding: 12px 18px;
        border-radius: 20px;
        border-left: 4px solid #d4a373;
        margin: 16px 0;
        font-size: 0.95rem;
      }

      .badge {
        display: inline-block;
        background: #eef2ff;
        padding: 6px 14px;
        border-radius: 40px;
        font-size: 0.75rem;
        font-weight: 500;
        color: #2c4c6e;
        margin-right: 8px;
        margin-bottom: 8px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0;
      }
      th,
      td {
        padding: 12px 8px;
        text-align: left;
        border-bottom: 1px solid #e9ecef;
      }
      th {
        background-color: #f8f9fc;
        font-weight: 600;
        color: #2c3e66;
      }

      .contact-card {
        background: #f1f5f9;
        border-radius: 20px;
        padding: 16px 20px;
        margin: 14px 0;
      }

        margin-top: 48px;

        font-size: 0.75rem;
        color: #95a5a6;
        border-top: 1px solid #eef2f5;
        padding-top: 24px;

      @media (max-width: 780px) {
        .app-wrapper {
          flex-direction: column;
        }

          width: 100%;
          border-right: none;
          border-bottom: 1px solid #e2e8f0;
          max-height: 300px;
          overflow-y: auto;

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 8px;
      }
    </style>
  </head>

      // 定義選單順序（依據原始需求排序）
      const menuOrder = [
        { id: "mtr", label: "🚇 港鐵資訊", icon: "fas fa-subway" },
        { id: "bus", label: "🚌 巴士資訊", icon: "fas fa-bus" },
        { id: "minibus", label: "🚐 小巴資訊", icon: "fas fa-van-shuttle" },
        { id: "taxi", label: "📞 電召的士", icon: "fas fa-taxi" },
        { id: "tow", label: "🛻 拖車資訊", icon: "fas fa-wrench" },
        { id: "crossBorder", label: "🚌 過境巴士・班次", icon: "fas fa-globe" },
        { id: "pet", label: "🐕 寵物配套設施", icon: "fas fa-paw" },
        {
          id: "motorcycle",
          label: "🏍️ 電單車車位 (深旺道入口)",
          icon: "fas fa-motorcycle",
        },
        {
          id: "bicycle",
          label: "🚲 單車車位 (停車場區域)",
          icon: "fas fa-bicycle",
        },
        {
          id: "ev_charging",
          label: "⚡ 電動車充電站 (Tesla超充)",
          icon: "fas fa-charging-station",
        },
        {
          id: "podium",
          label: "🌿 平台花園-2樓 (休憩/寵物)",
          icon: "fas fa-leaf",
        },
      ];

      // 動態建立選單
      const menuList = document.getElementById("menu-list");
      function buildMenu() {
        menuList.innerHTML = "";
        menuOrder.forEach((item) => {
          const li = document.createElement("li");
          li.className = "menu-item";
          li.dataset.id = item.id;
          const button = document.createElement("button");
          button.className = "menu-btn";
          button.innerHTML = `<i class="${item.icon}"></i><span>${item.label}</span>`;
          button.addEventListener("click", () => {
            setActiveMenuItem(item.id);
            renderMainContent(item.id);
          });
          li.appendChild(button);
          menuList.appendChild(li);
        });
      }

      function setActiveMenuItem(activeId) {
        const allItems = document.querySelectorAll(".menu-item");
        allItems.forEach((item) => {
          if (item.dataset.id === activeId) {
            item.classList.add("active");
          } else {
            item.classList.remove("active");
          }
        });
      }

      function renderMainContent(sectionId) {
        const section = sectionsData[sectionId];
        if (!section) return;
        const mainDiv = document.getElementById("dynamicContent");
        mainDiv.innerHTML = `
            <div class="content-card">
                <div class="section-title">${section.title}</div>
                <div class="section-sub"><i class="fas fa-location-dot"></i> 業戶位置指引 · 實用資訊</div>
                <div class="info-grid">
                    ${section.content}
                </div>
                <footer>
                    <i class="fas fa-regular fa-building"></i> 匯璽禮賓司 整理 · 資料即時更新 | 如住戶需要進一步協助，請致電 24h 服務中心
                </footer>
            </div>
        `;
      }

      // 初始化顯示第一個（港鐵資訊）
      function init() {
        buildMenu();
        if (menuOrder.length > 0) {
          const defaultId = menuOrder[0].id;
          setActiveMenuItem(defaultId);
          renderMainContent(defaultId);
        }
      }

      init();
    </script>
  </body>
</html>
